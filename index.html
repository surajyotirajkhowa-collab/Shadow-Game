// PARTICLES
function SP(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*4+1;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,l:1,d:Math.random()*.04+.02,r:Math.random()*3+2,c:col||'#ff3333'});
  }
}
function UP(){parts=parts.filter(p=>p.l>0);parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.vx*=.95;p.l-=p.d;});}

function RR(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

let CL=null; // current level (deep clone)

function loadLevel(li){
  lvl=li;lvTimer=0;lvDeaths=0;
  CL=JSON.parse(JSON.stringify(LEVELS[li]));
  // init moving spikes
  CL.spikes.forEach(s=>{if(s.moving){s._x=s.x;s._d=1;}});
  goalX=LEVELS[li].goal.x;goalY=LEVELS[li].goal.y;goalVX=0;chaseTimer=0;
  fakeWinTimer=0;hintShown=false;
  PR(li);
  parts=[];shakeT=0;
  phase='play';
  updateHUD();
  Object.keys(pr).forEach(k=>delete pr[k]);
}

function updateHUD(){
  document.getElementById('dc').textContent=deaths;
  document.getElementById('hud-c').textContent=LEVELS[lvl].name+' — '+LEVELS[lvl].sub;
}

// ── DIE ──
function die(type){
  if(phase!=='play')return;
  deaths++;lvDeaths++;
  const pool=DMSGS[type]||DMSGS.fall;
  dMsg=pool[Math.floor(Math.random()*pool.length)];
  dType=type;
  SP(P.x+P.w/2,P.y+P.h/2,22,'#ff3333');
  shakeT=18;phase='dead';dTimer=95;
  updateHUD();
  // taunt after 3+ deaths
  if(lvDeaths>=2&&Math.random()<0.7)showTaunt(DTAUNTS[Math.floor(Math.random()*DTAUNTS.length)]);
}

function showTaunt(m){
  tMsg=m;tTimer=160;
  const el=document.getElementById('taunt');
  el.textContent=m;el.style.opacity='1';
}
function hideTaunt(){document.getElementById('taunt').style.opacity='0';}

function levelDone(){
  phase='lvldone';dTimer=130;
  SP(P.x+P.w/2,P.y+P.h/2,35,'#ffdd44');
  SP(P.x+P.w/2,P.y+P.h/2,20,'#44ddff');
}

// ── DRAW PLATFORM ──
const PCOL={solid:'#22223a',collapse:'#22381c',fake:'#38221c',bounce:'#38371c',ice:'#1c3848',move:'#1c224a',teleport:'#44421c'};
const PBRD={solid:'#363658',collapse:'#3a5830',fake:'#583030',bounce:'#585030',ice:'#306878',move:'#30307a',teleport:'#706e30'};
function drawPlat(p){
  if(p.t==='flicker'&&!p._vis)return;
  const gone=p._st==='gone';
  if(gone)return;
  let alpha=1;
  if(p._st==='shaking')alpha=1-(p._ct/50)*0.6;
  ctx.globalAlpha=p.t==='fake'?0.82:alpha;
  const ox=p.t==='shaking'?Math.random()*3-1.5:0;
  ctx.fillStyle=PCOL[p.t]||'#22223a';
  ctx.fillRect(p.x+ox,p.y,p.w,p.h);
  ctx.strokeStyle=PBRD[p.t]||'#363658';
  ctx.lineWidth=1;
  ctx.strokeRect(p.x+ox+.5,p.y+.5,p.w-1,p.h-1);
  if(p.t==='ice'){ctx.fillStyle='rgba(100,190,220,.12)';ctx.fillRect(p.x,p.y,p.w,p.h);}
  if(p.lbl){
    ctx.fillStyle=p.t==='fake'?'#a06060':p.t==='teleport'?'#aaaa55':p.t==='bounce'?'#aaaa55':'#608060';
    ctx.font='8px Courier New';ctx.textAlign='center';
    ctx.fillText(p.lbl,p.x+ox+p.w/2,p.y+p.h/2+3);
  }
  // flicker glow
  if(p.t==='flicker'){
    const vis=p._ft/(p._vt||35);
    ctx.fillStyle=`rgba(80,80,180,${(1-vis)*0.15})`;
    ctx.fillRect(p.x,p.y,p.w,p.h);
  }
  ctx.globalAlpha=1;
}

// ── DRAW SPIKES ──
function drawSpike(s){
  const sx=s.moving?(s._x||s.x):s.x;
  ctx.fillStyle='#cc2222';
  const n=Math.floor(s.w/10);
  for(let i=0;i<n;i++){
    ctx.beginPath();
    if(s.ceil){ctx.moveTo(sx+i*10,s.y);ctx.lineTo(sx+i*10+5,s.y+13);ctx.lineTo(sx+i*10+10,s.y);}
    else{ctx.moveTo(sx+i*10,s.y+s.h);ctx.lineTo(sx+i*10+5,s.y);ctx.lineTo(sx+i*10+10,s.y+s.h);}
    ctx.closePath();ctx.fill();
  }
  ctx.fillStyle='rgba(255,40,40,.08)';ctx.fillRect(sx,s.y,s.w,s.h);
}

// ── DRAW GOAL ──
function drawGoal(x,y,w,h,isFake){
  const t=Date.now()/380,pulse=Math.sin(t)*2.5;
  ctx.save();ctx.translate(x+w/2,y+h/2);
  ctx.shadowColor=isFake?'#ff8844':'#ffdd33';ctx.shadowBlur=12+pulse;
  ctx.fillStyle=isFake?'#ff8844':'#ffdd33';
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2-Math.PI/2,r=i%2===0?w/2+pulse/2:w/4;
    ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.restore();
  ctx.fillStyle=isFake?'rgba(255,136,68,.7)':'rgba(255,220,50,.7)';
  ctx.font='bold 9px Courier New';ctx.textAlign='center';
  ctx.fillText(isFake?'GOAL!?':'GOAL',x+w/2,y-4);
}

// ── DRAW PLAYER ──
function drawPlayer(){
  ctx.save();
  const px=P.x,py=P.y+(P.h-P.h*P.sq),pw=P.w,ph=P.h*P.sq;
  ctx.shadowColor='#5522cc';ctx.shadowBlur=10;
  // body
  ctx.fillStyle='#0e0e1e';
  ctx.beginPath();ctx.ellipse(px+pw/2,py+ph*.62,pw/2,ph*.45,0,0,Math.PI*2);ctx.fill();
  // head
  ctx.beginPath();ctx.arc(px+pw/2,py+ph*.22,pw*.44,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // eyes
  P.blk=Math.max(0,P.blk-1);
  const eh=P.blk>0?1:3;
  ctx.fillStyle='#ffffff';
  ctx.fillRect(px+pw*.18,py+ph*.15,3,eh);
  ctx.fillRect(px+pw*.58,py+ph*.15,3,eh);
  // ground shadow
  ctx.globalAlpha=.25;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(P.x+pw/2,P.y+P.h+2,pw*.75,3,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.restore();
}

// ── DRAW EXTRAS ──
function drawExtras(){
  if(!CL.extras)return;
  CL.extras.forEach(e=>{
    if(e.type==='invert'){
      ctx.fillStyle='rgba(150,50,200,.06)';ctx.fillRect(e.x,e.y,e.w,e.h);
      ctx.setLineDash([3,5]);ctx.strokeStyle='rgba(150,50,200,.18)';ctx.lineWidth=1;
      ctx.strokeRect(e.x,e.y,e.w,e.h);ctx.setLineDash([]);
    }else if(e.type==='grav'){
      ctx.fillStyle='rgba(50,200,160,.05)';ctx.fillRect(e.x,e.y,e.w,e.h);
      ctx.setLineDash([3,5]);ctx.strokeStyle='rgba(50,200,160,.15)';ctx.lineWidth=1;
      ctx.strokeRect(e.x,e.y,e.w,e.h);ctx.setLineDash([]);
    }
  });
}

// ── BG ──
function drawBg(){
  ctx.fillStyle=CL.bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,.018)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=36;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

// ── TITLE SCREEN ──
function drawTitle(){
  ctx.fillStyle='#06060f';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,.02)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  ctx.textAlign='center';
  ctx.fillStyle='#ffffff';ctx.font='bold 46px Courier New';
  ctx.fillText('SHADOW STEPS',W/2,130);

  ctx.fillStyle='#88ff88';ctx.font='16px Courier New';
  ctx.fillText('"The Easiest Game Ever Made"',W/2,165);

  ctx.fillStyle='#555';ctx.font='12px Courier New';
  ctx.fillText('5 levels  |  100% fair*  |  skill-based gameplay',W/2,198);
  ctx.fillStyle='#2a2a2a';ctx.font='10px Courier New';
  ctx.fillText('*may contain lies',W/2,215);

  // mini character
  ctx.fillStyle='#0e0e1e';ctx.shadowColor='#5522cc';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(W/2,285,15,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(W/2,300,9,8,0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle='#fff';
  ctx.fillRect(W/2-9,280,3,4);ctx.fillRect(W/2+6,280,3,4);

  const a=.5+Math.sin(Date.now()/600)*.5;
  ctx.fillStyle=`rgba(200,200,200,${a})`;ctx.font='bold 14px Courier New';
  ctx.fillText('PRESS ANY KEY TO START',W/2,H-78);

  ctx.fillStyle='#333';ctx.font='11px Courier New';
  ctx.fillText('← → / A D  move    |    SPACE / ↑  jump',W/2,H-54);
  ctx.fillText('good luck. (you will need it.)',W/2,H-36);

  DP();
}

// ── FAKE WIN ──
function drawFakeWin(){
  fakeWinTimer++;
  ctx.fillStyle='#001100';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#00ff00';ctx.font='bold 44px Courier New';
  ctx.fillText('YOU WIN!!!',W/2,H/2-40);
  ctx.font='20px Courier New';
  ctx.fillText('CONGRATULATIONS!!!!',W/2,H/2);
  ctx.font='14px Courier New';
  ctx.fillText('You beat the game! Amazing! Incredible!',W/2,H/2+35);

  if(fakeWinTimer>115){
    ctx.fillStyle='#ff4444';ctx.font='bold 32px Courier New';
    ctx.fillText('jk lol 😂',W/2,H/2+85);
    ctx.font='14px Courier New';ctx.fillStyle='#ff6666';
    ctx.fillText('that wasn\'t real',W/2,H/2+118);
  }
  if(fakeWinTimer>220){loadLevel(4);showTaunt('did u REALLY think that was it 💀💀💀');}
  DP();
}

// ── REAL WIN ──
function drawRealWin(){
  ctx.fillStyle='#0c0c00';ctx.fillRect(0,0,W,H);
  SP(Math.random()*W,Math.random()*H*.6,2,`hsl(${Math.random()*60+20},100%,60%)`);
  DP();
  ctx.textAlign='center';
  ctx.fillStyle='#ffdd33';ctx.font='bold 36px Courier New';
  ctx.fillText('YOU ACTUALLY WON???',W/2,H/2-58);
  ctx.fillStyle='#ffaa33';ctx.font='15px Courier New';
  ctx.fillText('you stood still for 5 seconds.',W/2,H/2-20);
  ctx.fillText('that was the answer the whole time.',W/2,H/2+5);
  ctx.fillStyle='#888';ctx.font='13px Courier New';
  ctx.fillText(`total deaths: ${deaths}`,W/2,H/2+40);
  ctx.fillStyle='#555';ctx.font='11px Courier New';
  ctx.fillText('(or maybe you just gave up trying to reach the goal)',W/2,H/2+65);
  const a=.4+Math.sin(Date.now()/700)*.4;
  ctx.fillStyle=`rgba(255,255,100,${a})`;ctx.font='11px Courier New';
  ctx.fillText('press any key to play again',W/2,H-50);
}

// ── UPDATE ──
function update(){
  if(phase!=='play')return;
  lvTimer++;

  const g=gflip?-GRV:GRV;
  let mx=0;
  if(keys['ArrowLeft']||keys['KeyA'])mx=-1;
  if(keys['ArrowRight']||keys['KeyD'])mx=1;
  if(inv)mx=-mx;

  const jump=pr['Space']||pr['ArrowUp']||pr['KeyW'];

  // Movement
  P.vx+=mx*SPD*(1-FRC);
  // check ice
  let onIce=false;
  CL.plats.forEach(p=>{
    if(p.t==='ice'&&p._st!=='gone'&&RR(P.x,P.y+P.h-2,P.w,3,p.x,p.y,p.w,p.h))onIce=true;
  });
  P.vx*=onIce?IFRC:FRC;

  // Jump
  if(jump&&(P.onG||P.coy>0)){
    P.vy=gflip?-JV:JV;
    P.onG=false;P.coy=0;
    SP(P.x+P.w/2,P.y+P.h,5,'#333360');
  }

  P.vy+=g;P.vy=Math.max(-18,Math.min(18,P.vy));
  P.coy=Math.max(0,P.coy-1);

  // Move X
  P.x+=P.vx;
  // X collision (solid, collapse(if not gone), ice, bounce, move)
  CL.plats.forEach(p=>{
    if(p.t==='fake'||p.t==='teleport')return;
    if(p._st==='gone')return;
    if(p.t==='flicker'&&!p._vis)return;
    if(RR(P.x,P.y+3,P.w,P.h-6,p.x,p.y,p.w,p.h)){
      if(P.vx>0)P.x=p.x-P.w;
      else if(P.vx<0)P.x=p.x+p.w;
      P.vx=0;
    }
  });

  // Move Y
  P.y+=P.vy;P.onG=false;
  let riding=null;

  CL.plats.forEach(p=>{
    if(p.t==='fake'||p.t==='teleport')return;
    if(p._st==='gone')return;
    if(p.t==='flicker'&&!p._vis)return;
    if(!RR(P.x+1,P.y,P.w-2,P.h,p.x,p.y,p.w,p.h))return;

    const pBot=P.y-P.vy+P.h, pTop=P.y-P.vy;
    if(!gflip){
      if(P.vy>=0&&pBot<=p.y+5){
        P.y=p.y-P.h;P.vy=0;P.onG=true;P.coy=8;riding=p;
        if(p.t==='bounce'){P.vy=JV*2.3;P.onG=false;SP(P.x+P.w/2,P.y+P.h,14,'#aaaa22');}
        if(p.t==='collapse'&&p._st==='idle'){p._st='shaking';p._ct=0;}
      } else if(P.vy<0&&pTop>=p.y+p.h-4){P.y=p.y+p.h;P.vy=0;}
    } else {
      if(P.vy<=0&&pTop>=p.y+p.h-5){P.y=p.y+p.h;P.vy=0;P.onG=true;P.coy=8;riding=p;}
      else if(P.vy>0&&pBot<=p.y+4){P.y=p.y-P.h;P.vy=0;}
    }
  });

  // Carry on moving platform
  if(riding&&riding.t==='move')P.x+=riding.spd*riding.dir;

  // Update platforms
  CL.plats.forEach(p=>{
    if(p.t==='move'){
      p.x+=p.spd*p.dir;
      if(p.x>=p.mx2||p.x<=p.mx)p.dir*=-1;
    }
    if(p.t==='collapse'){
      if(p._st==='shaking'){p._ct++;if(p._ct>52){p._st='gone';p._ct=0;}}
      else if(p._st==='gone'){p._ct++;if(p._ct>190){p._st='idle';p._ct=0;}}
    }
    if(p.t==='flicker'){
      p._ft=(p._ft+1)%60;p._vis=p._ft<(p._vt||38);
    }
  });

  // Update moving spikes
  CL.spikes.forEach(s=>{
    if(s.moving){s._x+=s.spd*s._d;if(s._x>=s.mx2||s._x<=s.mx)s._d*=-1;}
  });

  // Teleport check
  CL.plats.forEach(p=>{
    if(p.t!=='teleport')return;
    if(RR(P.x,P.y,P.w,P.h,p.x,p.y,p.w,p.h))die(p.dtype||'teleport');
  });

  // Extra zones
  if(CL.extras){
    let inInv=false,inGrav=false;
    CL.extras.forEach(e=>{
      const inZone=RR(P.x,P.y,P.w,P.h,e.x,e.y,e.w,e.h);
      if(e.type==='invert'){
        if(inZone){inInv=true;if(!inv){inv=true;showTaunt('⚡ CONTROLS INVERTED 😂');}}
      }
      if(e.type==='grav'){
        if(inZone){inGrav=true;if(!gflip){gflip=true;showTaunt('↕ GRAVITY FLIPPED 🙃');}}
      }
      if(e.type==='fakegoal'&&inZone)die('fakegoal');
    });
    if(!inInv&&!RR(P.x-15,P.y,P.w+30,P.h,...getInvZoneBounds()))inv=false;
    if(!inGrav&&!RR(P.x-10,P.y,P.w+20,P.h,...getGravZoneBounds()))gflip=false;
  }

  // Spike collision
  CL.spikes.forEach(s=>{
    const sx=s.moving?(s._x||s.x):s.x;
    if(RR(P.x+2,P.y+2,P.w-4,P.h-4,sx,s.y,s.w,s.h))die('spike');
  });

  // Level 4 random control invert (only level 4)
  if(lvl===3&&Math.random()<0.0025){
    inv=!inv;showTaunt(inv?'🔀 CONTROLS RANDOMLY INVERTED':'controls back... for now');
  }

  // Level 5: goal runs away + stand-still win
  if(lvl===4){
    chaseTimer++;
    const dist=Math.hypot(P.x+P.w/2-goalX-13,P.y+P.h/2-goalY-13);
    if(dist<220&&chaseTimer>80)goalVX=Math.min(goalVX+.06,5);
    else goalVX*=.99;
    goalX+=goalVX;
    if(goalX>W-70){goalX=W-70;goalVX=0;
      if(RR(P.x,P.y,P.w,P.h,goalX,goalY,26,26)){phase='fakewin';fakeWinTimer=0;}
    }
    // stand still win condition
    if(Math.abs(P.vx)<0.15&&P.onG&&P.x<130){
      stillTimer++;
      if(stillTimer>=300)phase='win';
    } else {
      stillTimer=Math.max(0,stillTimer-1);
    }
    if(chaseTimer===420&&!hintShown){hintShown=true;showTaunt('psst... have you tried doing nothing? 👀');}
    if(chaseTimer===840&&!hintShown){hintShown=true;showTaunt('seriously... just... stand. still.');}
  }

  // Normal goal check
  if(lvl<4){
    const g2=LEVELS[lvl].goal;
    if(RR(P.x,P.y,P.w,P.h,goalX,goalY,g2.w,g2.h))levelDone();
  }

  // Out of bounds
  if(P.y>H+40||P.y<-250||P.x<-60||P.x>W+60)die('fall');

  // Squish
  if(P.onG&&!P.lastG){P.sq=1.35;P.blk=8;SP(P.x+P.w/2,P.y+P.h,4,'#22224a');}
  if(P.sq!==1){P.sq+=(1-P.sq)*.22;if(Math.abs(P.sq-1)<.01)P.sq=1;}
  P.lastG=P.onG;

  if(shakeT>0){shakeT--;shx=(Math.random()-.5)*6;shy=(Math.random()-.5)*6;}else{shx=0;shy=0;}
  if(tTimer>0)tTimer--;else hideTaunt();
  UP();

  Object.keys(pr).forEach(k=>delete pr[k]);
}

// Helper: get bounds of first invert/grav zone
function getInvZoneBounds(){
  if(!CL.extras)return[0,0,0,0];
  const e=CL.extras.find(e=>e.type==='invert');
  return e?[e.x,e.y,e.w,e.h]:[0,0,0,0];
}
function getGravZoneBounds(){
  if(!CL.extras)return[0,0,0,0];
  const e=CL.extras.find(e=>e.type==='grav');
  return e?[e.x,e.y,e.w,e.h]:[0,0,0,0];
}

// ── DRAW ──
function draw(){
  ctx.save();
  if(shakeT>0)ctx.translate(shx,shy);

  if(phase==='title'){drawTitle();ctx.restore();return;}
  if(phase==='fakewin'){drawFakeWin();ctx.restore();return;}
  if(phase==='win'){drawRealWin();ctx.restore();return;}

  drawBg();

  // Nearby spike danger tint
  CL.spikes.forEach(s=>{
    const sx=s.moving?(s._x||s.x):s.x;
    const d=Math.hypot(P.x+P.w/2-(sx+s.w/2),P.y+P.h/2-(s.y+s.h/2));
    if(d<90){ctx.fillStyle=`rgba(200,20,20,${.045*(1-d/90)})`;ctx.fillRect(0,0,W,H);}
  });

  drawExtras();
  CL.plats.forEach(drawPlat);
  CL.spikes.forEach(drawSpike);

  // Fake goal for level 3
  if(lvl===2&&CL.extras){
    const fg=CL.extras.find(e=>e.type==='fakegoal');
    if(fg)drawGoal(fg.x,fg.y,fg.w,fg.h,true);
  }

  // Goal
  drawGoal(goalX,goalY,LEVELS[lvl].goal.w,LEVELS[lvl].goal.h,false);

  if(phase==='play'||phase==='dead')drawPlayer();
  DP();

  // Status overlays
  if(inv){
    ctx.fillStyle='rgba(140,40,200,.12)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(180,100,255,.75)';ctx.font='10px Courier New';ctx.textAlign='right';
    ctx.fillText('⚡ CONTROLS INVERTED',W-10,H-56);
  }
  if(gflip){
    ctx.fillStyle='rgba(40,200,150,.07)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(80,220,170,.75)';ctx.font='10px Courier New';ctx.textAlign='right';
    ctx.fillText('↕ GRAVITY FLIPPED',W-10,H-44);
  }

  // Level 5 still timer
  if(lvl===4&&stillTimer>20){
    const pct=stillTimer/300;
    ctx.fillStyle='rgba(20,20,0,.7)';ctx.fillRect(W/2-110,H-65,220,22);
    ctx.fillStyle=`rgba(${255-Math.floor(pct*200)},${Math.floor(pct*220)},0,.9)`;
    ctx.fillRect(W/2-108,H-63,Math.floor(216*pct),18);
    ctx.fillStyle='rgba(255,255,100,.9)';ctx.font='10px Courier New';ctx.textAlign='center';
    ctx.fillText(`standing still: ${Math.floor(stillTimer/60)+1}s / 5s`,W/2,H-50);
  }

  // Dead overlay
  if(phase==='dead'){
    ctx.fillStyle='rgba(180,0,0,.2)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4444';ctx.font='bold 24px Courier New';ctx.textAlign='center';
    ctx.fillText('YOU DIED',W/2,H/2-22);
    ctx.font='13px Courier New';ctx.fillStyle='#ff8888';
    ctx.fillText(dMsg,W/2,H/2+10);
    ctx.fillStyle='#444';ctx.font='11px Courier New';
    ctx.fillText('respawning...',W/2,H/2+34);
  }

  // Level done
  if(phase==='lvldone'){
    ctx.fillStyle='rgba(10,60,10,.55)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#88ff88';ctx.font='bold 26px Courier New';ctx.textAlign='center';
    ctx.fillText('LEVEL COMPLETE ✓',W/2,H/2-18);
    ctx.fillStyle='#447744';ctx.font='12px Courier New';
    ctx.fillText(`deaths this level: ${lvDeaths}  |  total: ${deaths}`,W/2,H/2+16);
    if(lvl===LEVELS.length-2){ctx.fillStyle='#ff8844';ctx.font='11px Courier New';ctx.fillText('...the final level awaits. good luck. seriously.',W/2,H/2+38);}
  }

  ctx.restore();

  // Taunt update
  if(tTimer<=0)hideTaunt();
  else{const el=document.getElementById('taunt');el.textContent=tMsg;el.style.opacity=Math.min(tTimer/20,1).toString();}
}

// ── MAIN LOOP ──
function loop(){
  requestAnimationFrame(loop);

  if(phase==='dead'){
    dTimer--;
    if(dTimer<=0){PR(lvl);phase='play';}
  }
  if(phase==='lvldone'){
    dTimer--;
    if(dTimer<=0){
      if(lvl<LEVELS.length-1)loadLevel(lvl+1);
      else phase='win';
    }
  }

  update();
  draw();
}

document.addEventListener('keydown',()=>{
  if(phase==='title'){deaths=0;loadLevel(0);}
  else if(phase==='win'){deaths=0;loadLevel(0);}
});

// Init: render title
phase='title';
(function titloop(){
  requestAnimationFrame(titloop);
  if(phase==='title'){ctx.save();drawTitle();ctx.restore();}
})();
requestAnimationFrame(loop);
</script>
